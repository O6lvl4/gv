name: release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build (e.g. v0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_RELEASE_LTO: "fat"

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            cross: false
          - target: x86_64-apple-darwin
            runner: macos-13
            cross: false
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: false
            apt: musl-tools
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
    steps:
      - uses: actions/checkout@v4

      - name: install cross compile prerequisites (linux x86_64-musl)
        if: matrix.apt
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }} --bin gv --bin gv-shim

      - name: build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }} --bin gv --bin gv-shim

      - name: stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          stage="gv-${tag}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/gv" "dist/${stage}/gv"
          cp "target/${{ matrix.target }}/release/gv-shim" "dist/${stage}/gv-shim"
          cp README.md LICENSE "dist/${stage}/" 2>/dev/null || true
          cd dist
          tar -czf "${stage}.tar.gz" "${stage}"
          shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: gv-${{ matrix.target }}
          path: dist/*.tar.gz*
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -la dist/

      - name: combined checksums
        run: cd dist && shasum -a 256 *.tar.gz > SHA256SUMS

      - name: publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/SHA256SUMS
